name: Create Fragment

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  create-fragment:
    if: contains(github.event.issue.labels.*.name, 'new-fragment')
    runs-on: ubuntu-latest

    steps:
      - name: Close unauthorized issues
        if: github.event.issue.user.login != 'shutchin'
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number,
              body: 'This form is only enabled for `shutchin`, so this issue is being closed.'
            });

            await github.rest.issues.update({
              ...context.repo,
              issue_number,
              state: 'closed'
            });

      - name: Checkout repository
        if: github.event.issue.user.login == 'shutchin'
        uses: actions/checkout@v5

      - name: Parse issue form
        if: github.event.issue.user.login == 'shutchin'
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const issueBody = (process.env.ISSUE_BODY || '').replace(/\r\n/g, '\n');
          const outputPath = process.env.GITHUB_OUTPUT;
          const dataPath = path.join(process.env.RUNNER_TEMP, 'fragment-data.json');

          function readField(label) {
            const escaped = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const pattern = label === 'Body'
              ? new RegExp(`^### ${escaped}\\n\\n([\\s\\S]*)$`, 'm')
              : new RegExp(`^### ${escaped}\\n\\n([\\s\\S]*?)(?=\\n### |$)`, 'm');
            const match = issueBody.match(pattern);

            if (!match) {
              return '';
            }

            const value = match[1].trim();
            return value === 'No response' ? '' : value;
          }

          function slugify(value) {
            return value
              .normalize('NFKD')
              .replace(/[\u0300-\u036f]/g, '')
              .toLowerCase()
              .replace(/[^a-z0-9]+/g, '-')
              .replace(/^-+|-+$/g, '')
              .replace(/-{2,}/g, '-');
          }

          const title = readField('Title');
          const mode = readField('Mode');
          const origin = readField('Origin');
          const imageMarkdown = readField('Image upload');
          const imageAlt = readField('Image alt');
          const body = readField('Body');

          if (!title || !mode || !body) {
            throw new Error('The issue body is missing one or more required fragment fields.');
          }

          const slug = slugify(title) || 'fragment';
          const now = new Date();
          const datePrefix = now.toISOString().slice(0, 10);
          const imageMatch = imageMarkdown.match(/!\[[^\]]*]\((https?:\/\/[^)\s]+)\)/);
          const imageUrl = imageMatch ? imageMatch[1] : '';

          if (imageMarkdown && !imageUrl) {
            throw new Error('The image field must contain a markdown image link generated by GitHub upload.');
          }

          const data = {
            title,
            mode,
            origin,
            imageAlt,
            body,
            slug,
            datePrefix,
            timestamp: now.toISOString(),
          };

          fs.writeFileSync(dataPath, JSON.stringify(data, null, 2));

          const outputs = [
            ['data_path', dataPath],
            ['slug', slug],
            ['image_url', imageUrl],
          ];

          for (const [name, value] of outputs) {
            fs.appendFileSync(outputPath, `${name}=${value}\n`);
          }
          NODE

      - name: Download uploaded image
        if: github.event.issue.user.login == 'shutchin' && steps.parse.outputs.image_url != ''
        id: image
        env:
          IMAGE_URL: ${{ steps.parse.outputs.image_url }}
          SLUG: ${{ steps.parse.outputs.slug }}
        run: |
          set -euo pipefail

          headers_file="$RUNNER_TEMP/fragment-image-headers.txt"
          temp_file="$RUNNER_TEMP/fragment-image.bin"

          curl --fail --location --silent --show-error \
            --dump-header "$headers_file" \
            --output "$temp_file" \
            "$IMAGE_URL"

          content_type="$(awk 'BEGIN { IGNORECASE = 1 } /^content-type:/ { print tolower($2) }' "$headers_file" | tail -n 1 | tr -d '\r')"
          extension=""

          case "$content_type" in
            image/avif) extension="avif" ;;
            image/gif) extension="gif" ;;
            image/jpeg|image/jpg) extension="jpg" ;;
            image/png) extension="png" ;;
            image/svg+xml) extension="svg" ;;
            image/webp) extension="webp" ;;
          esac

          if [ -z "$extension" ]; then
            url_without_query="${IMAGE_URL%%\?*}"
            candidate_extension="${url_without_query##*.}"
            candidate_extension="$(printf '%s' "$candidate_extension" | tr '[:upper:]' '[:lower:]')"

            case "$candidate_extension" in
              avif|gif|jpg|png|svg|webp) extension="$candidate_extension" ;;
              jpeg) extension="jpg" ;;
              *)
                echo "Could not determine image extension from Content-Type or URL."
                exit 1
                ;;
            esac
          fi

          mkdir -p src/assets/fragments
          image_file="${SLUG}.${extension}"
          mv "$temp_file" "src/assets/fragments/${image_file}"

          printf 'image_file=%s\n' "$image_file" >> "$GITHUB_OUTPUT"

      - name: Create fragment file
        if: github.event.issue.user.login == 'shutchin'
        id: fragment
        env:
          DATA_PATH: ${{ steps.parse.outputs.data_path }}
          IMAGE_FILE: ${{ steps.image.outputs.image_file }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const data = JSON.parse(fs.readFileSync(process.env.DATA_PATH, 'utf8'));
          const imageFile = process.env.IMAGE_FILE || '';
          const fragmentPath = path.join(
            'src',
            'content',
            'fragments',
            `${data.datePrefix}-${data.slug}.md`,
          );

          function yamlString(value) {
            return JSON.stringify(value);
          }

          const lines = [
            '---',
            `title: ${yamlString(data.title)}`,
            `date: ${yamlString(data.timestamp)}`,
            `mode: ${yamlString(data.mode)}`,
          ];

          if (data.origin) {
            lines.push(`origin: ${yamlString(data.origin)}`);
          }

          if (imageFile) {
            lines.push(`image: ${yamlString(imageFile)}`);

            if (data.imageAlt) {
              lines.push(`imageAlt: ${yamlString(data.imageAlt)}`);
            }
          }

          lines.push('---', '', data.body.trim(), '');

          fs.writeFileSync(fragmentPath, lines.join('\n'));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `path=${fragmentPath}\n`);
          NODE

      - name: Create pull request
        if: github.event.issue.user.login == 'shutchin'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Add fragment ${{ steps.parse.outputs.slug }}
          branch: fragment/${{ steps.parse.outputs.slug }}
          delete-branch: true
          title: "Add fragment: ${{ steps.parse.outputs.slug }}"
          body: |
            Generated from issue #${{ github.event.issue.number }}.

            Closes #${{ github.event.issue.number }}.

      - name: Comment with pull request link
        if: github.event.issue.user.login == 'shutchin' && steps.cpr.outputs.pull-request-url != ''
        uses: actions/github-script@v7
        env:
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
        with:
          script: |
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: `Created pull request: ${process.env.PR_URL}`
            });
